<div class="flex items-center gap-6">
    <div class="card relative w-1/3 border">
        <img
            src="card-scanner-2.png"
            alt=""
            class="w-full"
        />
        <img
            src="{{ deckAnalysis()?.commander?.imageUri }}"
            class="commander absolute left-1/2 top-[47.5%]
            -translate-x-1/2 -translate-y-1/2
            w-[55%] rounded-xl"
            loading="lazy"
        />
        <div class="scan"></div>
    </div>
    <app-metric-dashboard [analysis]="deckAnalysis()!"/>
</div>
