@if (loading()) {
    <div class="fixed inset-0 z-50 grid place-items-center bg-black/40 backdrop-blur-sm">
        <div class="loading loading-ring loading-xl scale-[2.5] text-blue-300"></div>
    </div>
}

<div class="flex gap-6 items-start">
    <div class="card relative shrink-0 basis-1/3 w-1/3 pt-14">
        <img src="card-scanner-2.png" alt="" class="w-full block"/>
        @if (deckAnalysis()) {
            <img
                src="{{ deckAnalysis()?.commander?.imageUri }}"
                class="commander absolute left-1/2 top-[47.5%]
                -translate-x-1/2 -translate-y-35.5
                w-[55%] rounded-xl"
                loading="lazy"
            />
            <div class="scan" (animationend)="onScanComplete($event)"></div>
        }
    </div>
    @if(scanningComplete()) {
        <app-metric-dashboard [analysis]="deckAnalysis()!"/>
    }
</div>
