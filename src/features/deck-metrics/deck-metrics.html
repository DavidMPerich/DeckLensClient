@if (loading()) {
    <div class="fixed inset-0 z-50 grid place-items-center bg-black/40 backdrop-blur-sm">
        <div class="loading loading-ring loading-xl scale-[2.5] text-blue-300"></div>
    </div>
}

<!-- @if(scanningComplete()) {
    <app-metric-dashboard [analysis]="deckAnalysis()!"/>
} -->

<div class="flex flex-col min-w-50 lg:flex-row xl:max-w-7xl">
    <!-- Commander -->
    <section class="card lg:w-1/3 pb-10 lg:pb-0">
        <div class="relative w-full max-w-61 lg:min-w-80 lg:max-w-80 mx-auto">
            <img src="card-scanner-2.png" alt="" class="w-full h-auto block select-none"/>
            @if (deckAnalysis()) {
                <img
                    src="{{ deckAnalysis()?.commander?.imageUri }}"
                    class="commander absolute left-[49.9%] top-[15%]
                    -translate-x-1/2
                    w-[68%] rounded-xl select-none"
                    loading="lazy"
                />
                <div class="scan absolute h-[3%] w-[70%] left-[15%] right-[22%] top-[28%]" (animationend)="onScanComplete($event)"></div>
            }
        </div>
    </section>
    <!-- Metrics -->
    <section class="card lg:w-2/3 w-full grid justify-items-center">
        <div class="overflow-x-hidden overflow-y-auto lg:max-h-112 pr-2">
            <div
                class="grid gap-x-6 gap-y-2 lg:grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 ">
                        @for (i of [0,1,2,3,4,5]; track i) {
                            <app-metric-panel class="max-w-56 min-w-56 h-55 shrink-0" (pointerenter)="hoverSound.play()">
                                <audio #hoverSound src="sounds/clink.ogg" preload="auto"></audio>
                                @if (scanningComplete()) {
                                    <app-color-distribution-chart class="metric" [style.animation-delay.ms]="i * 200" [colorDistribution]="deckAnalysis()!.colorDistribution"></app-color-distribution-chart>
                                } @else {
                                    <div class="mt-3 space-y-2">
                                    <div class="h-3 rounded bg-white/10 animate-pulse"></div>
                                    <div class="h-3 rounded bg-white/10 animate-pulse w-5/6"></div>
                                    <div class="h-3 rounded bg-white/10 animate-pulse w-2/3"></div>
                                    <div class="h-20 rounded bg-white/10 animate-pulse"></div>
                                    </div>
                                }
                            </app-metric-panel>
                        }
            </div>
        </div>    
    </section>
</div>
