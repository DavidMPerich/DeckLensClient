
<div class="metric-grid metric-grid--enter">
  @for (i of [0,1,2,3,4,5]; track i) {
    <div class="metric-slot">
      <app-metric-panel class="w-2xs" (pointerenter)="hoverSound.play()">
        <audio #hoverSound src="sounds/clink.ogg" preload="auto"></audio>
        <div panelHeader class="text-sm font-semibold opacity-80">
          @if (i === 0) { Mana Curve } @else { Metric {{ i + 1 }} }
        </div>

        @if (i === 0) {
          <app-mana-curve-chart [manaCurveData]="analysis()!.manaCurve"></app-mana-curve-chart>
        } @else {
          <div class="opacity-70 text-sm">Coming soon…</div>
          <div class="mt-3 space-y-2">
            <div class="h-3 rounded bg-white/10 animate-pulse"></div>
            <div class="h-3 rounded bg-white/10 animate-pulse w-5/6"></div>
            <div class="h-3 rounded bg-white/10 animate-pulse w-2/3"></div>
            <div class="h-20 rounded bg-white/10 animate-pulse"></div>
          </div>
        }
      </app-metric-panel>
    </div>
  }
</div>
