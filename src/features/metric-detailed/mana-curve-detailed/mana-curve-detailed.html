<div class="card metric-panel h-full overflow-y-auto">
    <div class="w-full box-border px-18 py-14">
        <section class="w-full mx-auto flex flex-col gap-6">

            <!-- Top metrics -->
            <div class="flex flex-wrap justify-between gap-y-4 w-full">
                <div class="metric-spot metric-spot--top">Metric 1</div>
                <div class="metric-spot metric-spot--top">Metric 2</div>
                <div class="metric-spot metric-spot--top">Metric 3</div>
                <div class="metric-spot metric-spot--top">Metric 4</div>
            </div>

            <!-- Chart -->
            <div class="w-full min-w-0">
                <app-mana-curve-chart [manaCurveData]="analysis!.manaCurve"></app-mana-curve-chart>
            </div>

            <!-- Bottom insights -->
            <div class="flex flex-wrap justify-between gap-y-4 w-full">
                <div class="metric-spot metric-spot--bottom">Insight 1</div>
                <div class="metric-spot metric-spot--bottom">Insight 2</div>
                <div class="metric-spot metric-spot--bottom">Insight 3</div>
            </div>

        </section>
    </div>
</div>
