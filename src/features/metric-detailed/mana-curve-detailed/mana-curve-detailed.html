<div class="card metric-panel h-full overflow-y-auto">
    <div class="w-full box-border px-4 pt-10 pb-10">
        <section class="flex flex-col gap-6 w-full">
            <div class="flex flex-wrap justify-center gap-4 w-full">
                <div class="flex-1 basis-55 min-w-55 max-w-[320px]">
                    <div class="metric-spot">
                        Metric 1
                    </div>
                </div>
                <div class="flex-1 basis-55 min-w-55 max-w-[320px]">
                    <div class="metric-spot">
                        Metric 2
                    </div>
                </div>
                <div class="flex-1 basis-55 min-w-55 max-w-[320px]">
                    <div class="metric-spot">
                        Metric 3
                    </div>
                </div>
                <div class="flex-1 basis-55 min-w-55 max-w-[320px]">
                    <div class="metric-spot">
                        Metric 4
                    </div>
                </div>
            </div>

            <div class="flex justify-center items-stretch w-full">
                <div class="w-full max-w-275 min-w-0">
                    <app-mana-curve-chart [manaCurveData]="analysis!.manaCurve"></app-mana-curve-chart>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-4 w-full">
                <div class="flex-1 basis-65 min-w-65 max-w-105">
                    <div class="metric-spot">
                        Insight 1
                    </div>
                </div>
                <div class="flex-1 basis-65 min-w-65 max-w-105">
                    <div class="metric-spot">
                        Insight 2
                    </div>
                </div>
                <div class="flex-1 basis-65 min-w-65 max-w-105">
                    <div class="metric-spot">
                        Insight 3
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
