<div class="card metric-panel h-full overflow-y-auto">
    <div class="w-full box-border px-18 py-14">
        <section class="w-full mx-auto flex flex-col gap-6">

            <!-- Top metrics -->
            <div class="flex flex-wrap justify-between gap-y-4 w-full">
                <div class="metric-spot metric-spot--top">Metric 1</div>
                <div class="metric-spot metric-spot--top">Metric 2</div>
                <div class="metric-spot metric-spot--top">Metric 3</div>
                <div class="metric-spot metric-spot--top">Metric 4</div>
            </div>

            <!-- Breakdown selector -->
            <div class="flex flex-wrap items-center gap-3">
                <span class="text-sm text-white/70 mr-2">Breakdown:</span>

                <label class="breakdown-option">
                    <input
                        type="radio"
                        name="manaCurveBreakdown"
                        value="byCmc"
                        [checked]="selectedBreakdown() === 'byCmc'"
                        (change)="selectedBreakdown.set('byCmc')" />
                    <span>CMC</span>
                </label>

                <label class="breakdown-option">
                    <input
                        type="radio"
                        name="manaCurveBreakdown"
                        value="byColor"
                        [checked]="selectedBreakdown() === 'byColor'"
                        (change)="selectedBreakdown.set('byColor')" />
                    <span>Color</span>
                </label>

                <label class="breakdown-option">
                    <input
                        type="radio"
                        name="manaCurveBreakdown"
                        value="byType"
                        [checked]="selectedBreakdown() === 'byType'"
                        (change)="selectedBreakdown.set('byType')" />
                    <span>Type</span>
                </label>

                <label class="breakdown-option">
                    <input
                        type="radio"
                        name="manaCurveBreakdown"
                        value="byCreatureSplit"
                        [checked]="selectedBreakdown() === 'byCreatureSplit'"
                        (change)="selectedBreakdown.set('byCreatureSplit')" />
                    <span>Creature / Non-Creature</span>
                </label>
            </div>

            <!-- Chart -->
            <div class="w-full min-w-0">
                <apx-chart>

                </apx-chart>
            </div>

            <!-- Bottom insights -->
            <div class="flex flex-wrap justify-between gap-y-4 w-full">
                <div class="metric-spot metric-spot--bottom">Insight 1</div>
                <div class="metric-spot metric-spot--bottom">Insight 2</div>
                <div class="metric-spot metric-spot--bottom">Insight 3</div>
            </div>

        </section>
    </div>
</div>
