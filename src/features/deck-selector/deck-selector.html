<div class="flex flex-col items-center gap-6">
    <textarea
        class="textarea textarea-bordered h-64 w-1/2 max-w-2xl resize-none"
        placeholder="Imported deck list will appear here..."
        [value]="deck"
        readonly>
    </textarea>

    <button class="btn btn-info w-1/2" (click)="test()">Test</button>
    <button class="btn btn-secondary w-1/2" (click)="importDeck()">Import Deck</button>
    <button class="btn btn-primary w-1/2" [disabled]="!deck" (click)="analyze()">Analyze</button>

</div>
